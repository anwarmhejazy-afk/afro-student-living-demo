<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Afro Student Living</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="site-header">
  <div class="container nav">
    <a href="index.html" class="logo">
      <img src="images/logo.png" alt="Afro Student Living Logo">
    </a>

    <button class="menu-btn" id="menuBtn">☰</button>

    <nav class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="listings.html">Find Accommodation</a>
      <a href="list-property.html">List Property</a>
      <a href="index.html#how-it-works">How It Works</a>
      <a href="login.html">Login</a>
      <a href="login.html" class="btn btn-primary">Get Started</a>
    </nav>
  </div>
</header>

<main>
  <section class="auth-section">
    <div class="auth-card">
      <span class="eyebrow">Account access</span>
      <h1>Login to your account</h1>
      <p>Students, landlords, and admins will access their dashboards here.</p>

      <div class="login-tabs">
        <button>Student</button>
        <button>Landlord</button>
        <button>Admin</button>
      </div>

      <form class="premium-form">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="you@example.com">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Enter password">
        </div>

        <a href="dashboard.html" class="btn btn-accent full-btn">Login</a>
      </form>
    </div>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
