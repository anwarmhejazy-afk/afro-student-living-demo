<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin Dashboard | Afro Student Living</title>

  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>

  <script>
    document.body.style.display = "none";

    const allowedAdmins = [
      "anwar_hejazy@hotmail.com",
      "ygr08100@gmail.com"
    ];

    async function protectAdminPage() {
      const { data } = await window.supabaseClient.auth.getSession();

      if (!data.session) {
        window.location.href = "login.html";
        return;
      }

      const email = data.session.user.email.toLowerCase();

      if (!allowedAdmins.includes(email)) {
        await window.supabaseClient.auth.signOut();
        window.location.href = "login.html";
        return;
      }

      document.body.style.display = "";
    }

    protectAdminPage();
  </script>

  <main class="section">
    <div class="container">
      <span class="eyebrow">Admin dashboard</span>
      <h1>Property Submissions</h1>

      <button class="btn btn-accent" onclick="logoutAdmin()" type="button">Logout</button>

      <p>Total Submissions: <strong id="submissionCount">0</strong></p>

      <div style="overflow-x:auto;">
        <table width="100%">
          <thead>
            <tr>
              <th>Image</th>
              <th>Property</th>
              <th>State</th>
              <th>Type</th>
              <th>Price</th>
              <th>Owner</th>
              <th>WhatsApp</th>
              <th>Status</th>
            </tr>
          </thead>

          <tbody id="adminSubmissionsTable"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
